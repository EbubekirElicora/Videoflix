<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm your email</title>
</head>
<body style="margin: 0; padding: 0; background-color: #ffffff; font-family: Arial, Helvetica, sans-serif; color: #2e2e2e;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
        <tr>
            <td align="center" style="padding: 40px 20px;">
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="max-width: 680px;">
                    <tr>
                        <td align="center" style="padding-bottom: 36px;">
                            <img
                                src="cid:videoflix_logo"
                                alt="Videoflix"
                                width="260"
                                style="display: block; width: 260px; max-width: 100%; height: auto;"
                            >
                        </td>
                    </tr>

                    <tr>
                        <td style="font-size: 18px; line-height: 1.6;">
                            <p style="margin: 0 0 12px;">
                                Hello,
                            </p>

                            <p style="margin: 0 0 28px;">
                                Thank you for registering with Videoflix.
                                To complete your registration and verify your email address,
                                please click the button below.
                            </p>
                        </td>
                    </tr>

                    <tr>
                        <td style="padding-bottom: 28px;">
                            <a
                                href="{{ activation_link }}"
                                style="display: inline-block; padding: 16px 32px; background-color: #1b22df; color: #ffffff; text-decoration: none; font-size: 18px; font-weight: 700; border-radius: 32px;"
                            >
                                Activate account
                            </a>
                        </td>
                    </tr>

                    <tr>
                        <td style="font-size: 18px; line-height: 1.6;">
                            <p style="margin: 0 0 28px;">
                                If you did not create an account with us,
                                please disregard this email.
                            </p>

                            <p style="margin: 0 0 12px;">
                                Best regards,
                            </p>

                            <p style="margin: 0;">
                                Your Videoflix Team
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
